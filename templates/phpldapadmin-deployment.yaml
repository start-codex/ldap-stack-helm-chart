{{- if .Values.phpldapadmin.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ldap-stack.phpldapadmin.fullname" . }}
  labels:
    {{- include "ldap-stack.phpldapadmin.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "ldap-stack.phpldapadmin.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ldap-stack.phpldapadmin.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: phpldapadmin
          image: "{{ .Values.phpldapadmin.image.repository }}:{{ .Values.phpldapadmin.image.tag }}"
          imagePullPolicy: {{ .Values.phpldapadmin.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: APP_KEY
              value: "base64:{{ randAlphaNum 32 | b64enc }}"
            - name: LDAP_HOST
              value: {{ include "ldap-stack.openldap.fullname" . }}
            - name: LDAP_PORT
              value: "389"
            - name: LDAP_BASE_DN
              value: {{ include "ldap-stack.openldap.baseDN" . | quote }}
            - name: LDAP_USERNAME
              value: {{ include "ldap-stack.openldap.adminDN" . | quote }}
            - name: LDAP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ldap-stack.openldap.secretName" . }}
                  key: {{ .Values.openldap.secretKeys.adminPassword | default "admin-password" }}
            - name: LDAP_LOGIN_ATTR
              value: {{ .Values.phpldapadmin.ldap.loginAttr | default "uid" | quote }}
            - name: LDAP_ALERT_ROOTDN
              value: {{ .Values.phpldapadmin.ldap.alertRootDN | default "false" | quote }}
            {{- with .Values.phpldapadmin.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.phpldapadmin.resources | nindent 12 }}
      {{- with .Values.phpldapadmin.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.phpldapadmin.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.phpldapadmin.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
